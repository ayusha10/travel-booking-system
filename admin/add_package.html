{% extends "admin/base.html" %}
{% block title %}Add Package{% endblock %}
{% block content %}
<div class="topbar">
    <div>
        <h1>Add Package</h1>
        <p class="muted">Create a new destination package.</p>
    </div>
</div>

<form class="panel form-grid" method="post">
    <div>
        <label for="title">Package title</label>
        <input id="title" name="title" required>
    </div>
    <div>
        <label for="country">Country</label>
        <input id="country" name="country" required>
    </div>
    <div>
        <label for="price">Price</label>
        <input id="price" type="number" step="0.01" min="0" name="price" required>
    </div>
    <div>
        <label for="duration">Duration</label>
        <input id="duration" name="duration" placeholder="5 Days">
    </div>
    <div class="full">
        <label for="image">Image URL or filename</label>
        <input id="image" name="image">
    </div>
    <div class="full">
        <label for="description">Description</label>
        <textarea id="description" name="description"></textarea>
    </div>
    <div class="full check-row">
        <input id="is_featured" type="checkbox" name="is_featured">
        <label for="is_featured">Show on home page</label>
    </div>
    <div class="full actions">
        <button class="btn" type="submit">Save Package</button>
        <a class="btn secondary" href="{{ url_for('admin_packages') }}">Cancel</a>
    </div>
</form>
{% endblock %}
