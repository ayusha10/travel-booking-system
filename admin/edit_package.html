{% extends "admin/base.html" %}
{% block title %}Edit Package{% endblock %}
{% block content %}
<div class="topbar">
    <div>
        <h1>Edit Package</h1>
        <p class="muted">Update package details.</p>
    </div>
</div>

<form class="panel form-grid" method="post">
    <div>
        <label for="title">Package title</label>
        <input id="title" name="title" value="{{ package.title }}" required>
    </div>
    <div>
        <label for="country">Country</label>
        <input id="country" name="country" value="{{ package.country }}" required>
    </div>
    <div>
        <label for="price">Price</label>
        <input id="price" type="number" step="0.01" min="0" name="price" value="{{ package.price }}" required>
    </div>
    <div>
        <label for="duration">Duration</label>
        <input id="duration" name="duration" value="{{ package.duration or '' }}">
    </div>
    <div class="full">
        <label for="image">Image URL or filename</label>
        <input id="image" name="image" value="{{ package.image or '' }}">
    </div>
    <div class="full">
        <label for="description">Description</label>
        <textarea id="description" name="description">{{ package.description or "" }}</textarea>
    </div>
    <div class="full check-row">
        <input id="is_featured" type="checkbox" name="is_featured" {% if package.is_featured %}checked{% endif %}>
        <label for="is_featured">Show on home page</label>
    </div>
    <div class="full actions">
        <button class="btn" type="submit">Update Package</button>
        <a class="btn secondary" href="{{ url_for('admin_packages') }}">Cancel</a>
    </div>
</form>
{% endblock %}
